[workspace]
authors = ["Leonardo Gigli <leonardo.gigli@thecrossproduct.com>"]
channels = ["conda-forge"]
name = "arch-agent"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.12.*"
ipython = ">=9.13.0,<10"
numpy = ">=1.26,<2"
pandas = ">=2.0,<3"
scipy = ">=1.11,<2"
scikit-learn = ">=1.3,<2"
networkx = ">=3.2,<4"
open3d = ">=0.18"
pyyaml = ">=6.0,<7"
laspy = ">=2.7.0,<3"
spyder = ">=6.1.4,<7"

[pypi-dependencies]
langgraph = ">=1.2.1,<2"
langchain = ">=1.3.1,<2"
langchain-ollama = ">=1.1.0,<2"
langchain-core = ">=0.3.58"
